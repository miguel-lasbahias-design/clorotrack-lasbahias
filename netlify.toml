# Configuración de Netlify para clorotrack-lasbahias
# - publish: la raíz (sitio estático)
# - functions: subcarpeta netlify/functions/

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200
